# prek config. Uses `repo: builtin` for the hygiene checks (native, no clone,
# no Python env) — this makes the file prek-only, not the standard pre-commit
# tool. External-tool hooks keep their repos; Renovate (:enablePreCommit) bumps
# their rev. No Brindille linter exists, so templates aren't linted here.
repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      # check-json rejects comments / trailing commas; validate .json5
      # (.github/renovate.json5) with the JSON5-aware parser instead.
      - id: check-json5

  # Lint GitHub Actions workflows (syntax, expressions, matrix, run: shell).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Static analysis for the bash scripts (build.sh, run.sh, doc-tools/*.sh).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Security audit for the GitHub Actions workflows.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
