# Hook versions (rev) are kept up to date by Renovate (:enablePreCommit).
# No Brindille linter exists, so templates aren't linted here — this focuses on
# the CI workflows and shell scripts around them.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  # Lint GitHub Actions workflows (syntax, expressions, matrix, run: shell).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Static analysis for the bash scripts (build.sh, run.sh, doc-tools/*.sh).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Security audit for the GitHub Actions workflows.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
