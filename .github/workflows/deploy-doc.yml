name: Deploy docs to GitHub Pages

# Publishes doc/ to GitHub Pages on each release, so the live guide tracks a
# released version (not every push to main). Screenshots are not committed —
# they're regenerated here from a fresh, seeded instance before publishing.
# Requires: Settings > Pages > Source = GitHub Actions.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel a deployment in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BASE_URL: http://localhost:8099
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Regenerate the guide screenshots from a fresh instance (same image as
      # local dev / the test suite). No layer cache: this is a publishing
      # workflow, and a poisoned cache could reach the deployed site (zizmor).
      - name: Build the Paheko image
        run: docker build -t paheko-joachim:doc .

      - name: Start a fresh instance
        run: |
          docker run -d --name paheko-doc \
            -e WWW_URL="${BASE_URL}/" \
            -p 8099:80 paheko-joachim:doc
          for i in $(seq 1 30); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' "${BASE_URL}/admin/install.php")" = "200" ]; then
              echo "up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "instance did not come up"; docker logs paheko-doc; exit 1

      - name: Install + enable caisse and the module
        run: docker exec -i -u www-data paheko-doc php < doc-tools/bootstrap-instance.php

      - name: Seed the demo fixture
        run: |
          SEED_OUT="$(docker exec -i -u www-data paheko-doc php < doc-tools/seed-demo.php)"
          echo "$SEED_OUT"
          {
            echo "ADMIN_EMAIL=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^ADMIN_EMAIL=//p')"
            echo "ADMIN_PASSWORD=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^ADMIN_PASSWORD=//p')"
            echo "CAMILLE_ID=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^CAMILLE_ID=//p')"
            echo "PAY_EDIT=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^PAY_EDIT=//p')"
          } >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Generate the guide screenshots
        working-directory: tests
        run: |
          uv run playwright install --with-deps chromium
          uv run python ../doc-tools/screenshots.py

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: doc
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Container logs on failure
        if: failure()
        run: docker logs paheko-doc
