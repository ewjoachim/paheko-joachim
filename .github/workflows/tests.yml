name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:8095
      # The tests exec php in the running container (reseed, read back entries).
      CONTAINER_EXEC: docker exec -i -u www-data paheko-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Same image as local dev (core + caisse from the official Paheko image).
      # load: build into the local daemon (we run it in this job, no registry).
      # gha layer cache reuses unchanged layers across runs. Safe here because
      # this workflow only runs on PRs (no trusted/publishing context that a
      # poisoned cache could reach — zizmor cache-poisoning).
      - name: Build the Paheko image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          tags: paheko-joachim:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start a fresh instance
        run: |
          docker run -d --name paheko-ci \
            -e WWW_URL="${BASE_URL}/" \
            -p 8095:80 paheko-joachim:ci
          # Wait for Apache + PHP to answer the install page.
          for i in $(seq 1 30); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' "${BASE_URL}/admin/install.php")" = "200" ]; then
              echo "up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "instance did not come up"; docker logs paheko-ci; exit 1

      - name: Install + enable caisse and the module
        run: docker exec -i -u www-data paheko-ci php < doc-tools/bootstrap-instance.php

      - name: Seed the demo fixture
        run: |
          SEED_OUT="$(docker exec -i -u www-data paheko-ci php < doc-tools/seed-demo.php)"
          echo "$SEED_OUT"
          # Expose the seeded ids/credentials to the test steps.
          {
            echo "ADMIN_EMAIL=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^ADMIN_EMAIL=//p')"
            echo "ADMIN_PASSWORD=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^ADMIN_PASSWORD=//p')"
            echo "CAMILLE_ID=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^CAMILLE_ID=//p')"
            echo "PAY_EDIT=$(printf '%s\n' "$SEED_OUT" | sed -n 's/^PAY_EDIT=//p')"
          } >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # No uv cache: the deps are tiny and zizmor flags it as a
          # cache-poisoning surface. The Docker layer cache above is the one
          # that actually saves time.
          enable-cache: false

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run the tests
        run: uv run pytest

      # Regenerate the guide screenshots too (the instance is already up): this
      # catches a page that no longer captures, and uploads a preview of how the
      # guide will look. Publishing happens only on release (deploy-doc.yml).
      # The tests mutate data, so reseed for a clean fixture first.
      - name: Generate guide screenshots (preview)
        run: |
          docker exec -i -u www-data paheko-ci php < doc-tools/seed-demo.php
          uv run python doc-tools/screenshots.py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: guide-screenshots
          path: doc/suivi_cheques/screenshots/

      - name: Container logs on failure
        if: failure()
        run: docker logs paheko-ci
